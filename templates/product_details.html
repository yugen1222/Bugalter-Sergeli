<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{product_name}}</title><style>
body{font-family:Arial;background:#f5f4ef;padding:24px;color:#262626}.wrap{max-width:1100px;margin:auto}.panel{background:white;padding:20px;border-radius:16px}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}a{color:#2f6f52;font-weight:700}.bad{color:#b42318}
</style></head><body><div class="wrap"><p><a href="/">← Назад</a></p><div class="panel">
<h1>📦 {{product_name}}</h1>
<table><tr><th>Дата</th><th>Минус</th><th>Причина</th><th>Ответственный</th><th>Кто проверял</th><th>Комментарий</th></tr>
{% for x in rows %}<tr><td>{{x.check_date}}</td><td>{{x.quantity}}</td><td class="{{'bad' if x.status == 'unresolved' else ''}}">{{x.reason}}</td><td>{{x.responsible_name or '—'}}</td><td>{{x.employee_name}}<br>{{x.shift or ''}}</td><td>{{x.comment or '—'}}</td></tr>{% else %}<tr><td colspan="6">История отсутствует</td></tr>{% endfor %}
</table></div></div></body></html>
